baseURL = "https://tools.debuginn.com/"
theme = "hugo-theme-skills"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[sitemap]
  changefreq = "weekly"
  priority = 0.5

[languages]
  [languages.en]
    languageName = "English"
    languageCode = "en"
    weight = 1
    contentDir = "content"
    title = "DebugInn AI Tools"
    [languages.en.params]
      langHref = "/"
      langLabel = "EN"
      siteDescription = "A set of lightweight creative utilities for generating share posters and blog covers. No install needed — open and use."
  [languages.zh]
    languageName = "中文"
    languageCode = "zh-CN"
    weight = 2
    contentDir = "content/zh"
    title = "Debug客栈 AI 工具站"
    [languages.zh.params]
      langHref = "/zh/"
      langLabel = "中文"
      brandName = "Debug客栈"
      siteDescription = "一套轻量级创意工具，用于生成分享海报和博客封面图。无需安装，打开即用。"

[params]
  brandName = "DebugInn"
  logoImage = "/img/logo.jpg"
  ogImage = "/img/logo.jpg"
  twitterHandle = "@debuginn"
  blogURL = "https://blog.debuginn.com/"
  githubURL = "https://github.com/debuginn"
  twitterURL = "https://x.com/idebuginn"
  telegramURL = "https://t.me/idebuginn"
  copyright = "Open source, freely shared."
  installCmd = "/plugin marketplace add debuginn/skills"
