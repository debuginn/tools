<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Blog 主题图生成器</title>
  <link rel="icon" type="image/jpeg" href="../../logo.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../debuginn-blog-cover/app.css" />
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="nav-shell">
        <nav class="top-pill">
          <div class="pill-left">
            <a class="logo" href="../" aria-label="Debug客栈">
              <img class="logo-mark" src="../../logo.jpg" alt="Debug客栈 logo" />
              <span>Debug客栈</span>
            </a>
            <div class="desktop-nav">
              <a href="../">工具</a>
              <a href="https://blog.debuginn.com/" target="_blank" rel="noopener">博客</a>
              <a href="https://github.com/debuginn" target="_blank" rel="noopener">GitHub</a>
            </div>
          </div>
          <div class="pill-right">
            <button id="themeToggleBtn" class="mode-btn" type="button" aria-label="切换主题">◐</button>
            <div class="header-lang-dropdown">
              <button id="langToggleBtn" class="header-lang-trigger" type="button" aria-label="切换语言" aria-haspopup="listbox" aria-expanded="false">
                <span class="header-lang-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="9"></circle>
                    <path d="M3 12h18"></path>
                    <path d="M12 3c2.6 2.4 4 5.6 4 9s-1.4 6.6-4 9c-2.6-2.4-4-5.6-4-9s1.4-6.6 4-9z"></path>
                  </svg>
                </span>
                <span class="header-lang-current">中文</span>
              </button>
              <div class="header-lang-menu" role="listbox" aria-label="语言选项">
                <button type="button" data-lang-href="./" class="active">中文</button>
                <button type="button" data-lang-href="../../debuginn-blog-cover/">EN</button>
              </div>
            </div>
          </div>
        </nav>
      </div>
    </header>

    <div class="app">
      <aside class="panel">
        <div class="panel-bar" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <p class="panel-path">$ config: /builder/debuginn-blog-cover</p>
        <h1>Blog 主题图生成器</h1>
        <p class="panel-desc">上传 Logo、输入标题，快速生成带有中心图标和发光背景的 blog 封面图。</p>

        <div class="field">
          <label for="imageInput">中心图标</label>
          <div class="upload-control">
            <input id="imageInput" class="sr-only-input" type="file" accept="image/*" />
            <label for="imageInput" class="upload-trigger">选择图标文件</label>
            <span id="imageFileName" class="upload-file-name" data-empty-zh="未选择文件" data-empty-en="No file selected">未选择文件</span>
          </div>
        </div>

        <div class="field">
          <label for="titleInput">主标题</label>
          <input id="titleInput" type="text" value="蚂蚁银行" />
        </div>

        <div class="field">
          <label>主题色</label>
          <input id="accentInput" class="sr-only-input" type="color" value="#3a66ff" />
          <div class="scheme-grid" aria-label="主题色方案">
            <button class="scheme-btn accent-btn is-active" type="button" data-accent="#3a66ff" aria-label="蓝色主题">
              <span class="scheme-swatch scheme-swatch-accent-blue"></span>
            </button>
            <button class="scheme-btn accent-btn" type="button" data-accent="#6d4aff" aria-label="紫色主题">
              <span class="scheme-swatch scheme-swatch-accent-violet"></span>
            </button>
            <button class="scheme-btn accent-btn" type="button" data-accent="#12b3a8" aria-label="青绿色主题">
              <span class="scheme-swatch scheme-swatch-accent-teal"></span>
            </button>
            <button class="scheme-btn accent-btn" type="button" data-accent="#ff7a45" aria-label="橙色主题">
              <span class="scheme-swatch scheme-swatch-accent-orange"></span>
            </button>
            <button id="pickAccentBtn" class="scheme-btn accent-btn accent-picker-btn" type="button" aria-label="自定义主题色">
              <span id="customAccentSwatch" class="scheme-swatch scheme-swatch-custom"></span>
            </button>
          </div>
        </div>

        <div class="field">
          <label for="glowInput">发光强度</label>
          <input id="glowInput" type="range" min="20" max="100" value="68" />
        </div>

        <div class="field">
          <label for="trackingInput">主标题字间距</label>
          <input id="trackingInput" type="range" min="0" max="72" value="18" />
        </div>

        <div class="btns">
          <button id="downloadBtn" class="btn btn-primary" type="button">导出 PNG</button>
        </div>
      </aside>

      <section class="preview-wrap">
        <div class="preview-bar" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <p class="preview-path">$ preview: blog-cover</p>
        <div class="canvas-shell">
          <canvas id="preview" width="1600" height="900"></canvas>
        </div>
      </section>
    </div>

    <footer class="footer">
      <div class="footer-card">
        <div class="footer-main">
          <div class="footer-brand-col">
            <a class="logo footer-brand-wrap" href="../">
              <img class="logo-mark" src="../../logo.jpg" alt="Debug客栈 logo" style="width:48px;height:48px;border-radius:12px;object-fit:cover;" />
              <span class="footer-brand-text">
                <span>Debug客栈</span>
                <span class="footer-tag">Tools &amp; Skills</span>
              </span>
            </a>
            <nav class="footer-inline-links">
              <a href="../">工具</a>
              <a href="https://blog.debuginn.com/" target="_blank" rel="noopener">博客</a>
              <a href="https://github.com/debuginn" target="_blank" rel="noopener">GitHub</a>
            </nav>
          </div>
        </div>
        <div class="footer-bottom">
          <span>© 2026 Debuginn. All rights reserved.</span>
          <div class="footer-meta">
            <p class="footer-credit">Built with ♥ by <a href="https://blog.debuginn.com/" target="_blank" rel="noopener">Debuginn</a>. Theme <a href="https://github.com/debuginn/hugo-theme-pebble" target="_blank" rel="noopener">Pebble</a>.</p>
          </div>
        </div>
      </div>
    </footer>
  </main>

  <script src="../../debuginn-blog-cover/app.js?v=3"></script>
</body>
</html>
