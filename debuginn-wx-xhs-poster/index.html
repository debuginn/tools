<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>小红书微信截图分享海报</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./app.css" />
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="nav-shell">
        <nav class="top-pill">
          <div class="pill-left">
            <a class="logo tool-title" href="./" aria-label="debuginn-wx-xhs-poster">
              <img class="logo-mark" src="../favicon.svg" alt="Debuginn Tools" />
              <span>debuginn-wx-xhs-poster</span>
            </a>
          </div>
          <div class="pill-right">
            <a class="home-link home-link-icon" href="../" aria-label="返回首页">
              <span class="sf-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M9 18.5v-4.2c0-.9.7-1.6 1.6-1.6h2.8c.9 0 1.6.7 1.6 1.6v4.2"></path>
                  <path d="M4.8 10.5L12 4.8l7.2 5.7"></path>
                  <path d="M6.4 9.3v9.1c0 .9.7 1.6 1.6 1.6h8c.9 0 1.6-.7 1.6-1.6V9.3"></path>
                </svg>
              </span>
            </a>
            <button id="themeToggleBtn" class="mode-btn" type="button" aria-label="Switch theme">◐</button>
            <div class="header-lang-dropdown">
              <button id="langToggleBtn" class="header-lang-trigger" type="button" aria-label="Switch language" aria-haspopup="listbox" aria-expanded="false">
                <span class="header-lang-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="9"></circle>
                    <path d="M3 12h18"></path>
                    <path d="M12 3c2.6 2.4 4 5.6 4 9s-1.4 6.6-4 9c-2.6-2.4-4-5.6-4-9s1.4-6.6 4-9z"></path>
                  </svg>
                </span>
                <span class="header-lang-current">中文</span>
              </button>
              <div class="header-lang-menu" role="listbox" aria-label="Language options">
                <button type="button" data-lang-option="zh" class="active">中文</button>
                <button type="button" data-lang-option="en">EN</button>
              </div>
            </div>
          </div>
        </nav>
      </div>
    </header>

    <div class="app">
      <aside class="panel">
        <div class="panel-bar" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <p class="panel-path" data-i18n="panelPath">$ config: /builder/debuginn-wx-xhs-poster</p>
        <h1 data-i18n="panelTitle">小红书微信截图分享海报</h1>
        <p class="panel-desc" data-i18n="panelDesc">上传截图、编辑文案、调整背景和标题配色，实时预览并导出方形分享图。</p>

        <div class="field">
          <label for="sizeSelect" data-i18n="sizeLabel">尺寸比例</label>
          <select id="sizeSelect" class="visually-hidden-select" aria-hidden="true" tabindex="-1">
            <option value="square" selected>1:1 微信</option>
            <option value="xhs">3:4 小红书</option>
          </select>
          <div class="scheme-grid" aria-label="尺寸比例">
            <button class="scheme-btn size-btn is-active" type="button" data-size="square" data-i18n="sizeWechat">1:1 微信</button>
            <button class="scheme-btn size-btn" type="button" data-size="xhs" data-i18n="sizeXhs">3:4 小红书</button>
          </div>
        </div>

        <div class="field">
          <label data-i18n="bgLabel">背景色</label>
          <div class="visually-hidden-color-inputs" aria-hidden="true">
            <input id="bgInput" type="color" value="#ffffff" tabindex="-1" />
            <input id="bgHexInput" type="text" value="#ffffff" tabindex="-1" />
          </div>
          <div class="scheme-grid" aria-label="背景色方案">
            <button class="scheme-btn bg-btn is-active" type="button" data-bg="#ffffff" aria-label="白色背景">
              <span class="scheme-swatch scheme-swatch-bg-white"></span>
            </button>
            <button class="scheme-btn bg-btn" type="button" data-bg="#eef2f7" aria-label="浅灰背景">
              <span class="scheme-swatch scheme-swatch-bg-gray"></span>
            </button>
            <button class="scheme-btn bg-btn" type="button" data-bg="#f7f0e8" aria-label="米色背景">
              <span class="scheme-swatch scheme-swatch-bg-cream"></span>
            </button>
            <button class="scheme-btn bg-btn" type="button" data-bg="#111827" aria-label="深色背景">
              <span class="scheme-swatch scheme-swatch-bg-dark"></span>
            </button>
            <button id="pickColorBtn" class="scheme-btn bg-btn bg-picker-btn" type="button" aria-label="自定义颜色">
              <span id="customBgSwatch" class="scheme-swatch scheme-swatch-custom"></span>
            </button>
          </div>
        </div>

        <div class="field">
          <label for="imageInput" data-i18n="imageLabel">截图图片</label>
          <div class="upload-control">
            <input id="imageInput" class="sr-only-input" type="file" accept="image/*" />
            <label for="imageInput" class="upload-trigger" data-i18n="chooseFile">选择截图文件</label>
            <span id="imageFileName" class="upload-file-name" data-empty-zh="未选择文件" data-empty-en="No file selected">未选择文件</span>
          </div>
        </div>

        <div class="field">
          <label for="titleInput" data-i18n="titleLabel">主标题</label>
          <input id="titleInput" type="text" value="总览" />
        </div>

        <div class="field">
          <label for="gradientSelect" data-i18n="titleSchemeLabel">标题配色方案</label>
          <select id="gradientSelect" class="visually-hidden-select" aria-hidden="true" tabindex="-1">
            <option value="cool" selected>冷色炫彩</option>
            <option value="warm">暖色炫彩</option>
            <option value="ocean">海蓝渐变</option>
            <option value="mono">深色单色</option>
          </select>
          <div class="scheme-grid" aria-label="标题配色方案">
            <button class="scheme-btn is-active" type="button" data-scheme="cool" aria-label="冷色炫彩">
              <span class="scheme-swatch scheme-swatch-cool"></span>
            </button>
            <button class="scheme-btn" type="button" data-scheme="warm" aria-label="暖色炫彩">
              <span class="scheme-swatch scheme-swatch-warm"></span>
            </button>
            <button class="scheme-btn" type="button" data-scheme="ocean" aria-label="海蓝渐变">
              <span class="scheme-swatch scheme-swatch-ocean"></span>
            </button>
            <button class="scheme-btn" type="button" data-scheme="mono" aria-label="深色单色">
              <span class="scheme-swatch scheme-swatch-mono"></span>
            </button>
          </div>
        </div>

        <div class="field">
          <label for="subtitleInput" data-i18n="subtitleLabel">副标题</label>
          <input id="subtitleInput" type="text" value="清晰呈现你的资产全貌" />
        </div>

        <div class="btns">
          <button id="downloadBtn" class="btn btn-primary" type="button" data-i18n="downloadPng">导出 PNG</button>
        </div>
      </aside>

      <section class="preview-wrap">
        <div class="preview-bar" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <p class="preview-path" data-i18n="previewPath">$ preview: live-canvas</p>
        <div class="canvas-shell">
          <canvas id="preview" width="1080" height="1080"></canvas>
        </div>
      </section>
    </div>

    <footer class="footer">
      <span>© 2026 Debuginn Tools</span>
      <a href="../" data-i18n="backHome">返回首页</a>
    </footer>
  </main>

  <div id="colorModal" class="modal" hidden>
    <div class="modal-backdrop" data-close-modal="true"></div>
    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="colorModalTitle">
      <div class="modal-bar" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <p class="modal-path">$ background: debuginn-wx-xhs-poster</p>
      <div class="modal-head">
        <h2 id="colorModalTitle">选择背景色</h2>
        <button id="closeColorModalBtn" class="modal-close" type="button" aria-label="关闭">关闭</button>
      </div>
      <div class="modal-preview">
        <span id="modalColorPreview" class="modal-preview-swatch"></span>
        <span id="modalColorValue" class="modal-preview-value">#ffffff</span>
      </div>
      <div class="modal-section">
        <span class="modal-label">预设颜色</span>
        <div class="scheme-grid modal-scheme-grid" aria-label="背景预设颜色">
          <button class="scheme-btn modal-bg-btn" type="button" data-modal-bg="#ffffff" aria-label="白色背景">
            <span class="scheme-swatch scheme-swatch-bg-white"></span>
          </button>
          <button class="scheme-btn modal-bg-btn" type="button" data-modal-bg="#eef2f7" aria-label="浅灰背景">
            <span class="scheme-swatch scheme-swatch-bg-gray"></span>
          </button>
          <button class="scheme-btn modal-bg-btn" type="button" data-modal-bg="#f7f0e8" aria-label="米色背景">
            <span class="scheme-swatch scheme-swatch-bg-cream"></span>
          </button>
          <button class="scheme-btn modal-bg-btn" type="button" data-modal-bg="#111827" aria-label="深色背景">
            <span class="scheme-swatch scheme-swatch-bg-dark"></span>
          </button>
          <button class="scheme-btn modal-bg-btn" type="button" data-modal-bg="#dbeafe" aria-label="浅蓝背景">
            <span class="scheme-swatch scheme-swatch-bg-sky"></span>
          </button>
          <button class="scheme-btn modal-bg-btn" type="button" data-modal-bg="#fde68a" aria-label="浅金背景">
            <span class="scheme-swatch scheme-swatch-bg-gold"></span>
          </button>
        </div>
      </div>
      <div class="modal-section">
        <label class="modal-label" for="modalHexInput">HEX</label>
        <input id="modalHexInput" class="modal-input" type="text" value="#ffffff" />
      </div>
      <div class="modal-actions">
        <button id="modalEyedropperBtn" class="modal-btn modal-btn-secondary" type="button">拾色器</button>
        <button id="applyColorBtn" class="modal-btn modal-btn-primary" type="button">应用颜色</button>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
